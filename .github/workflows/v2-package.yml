name: v2 Package - test and lint

on:
  push:
    branches: [master]
    paths:
      - 'salesforce_datacloud_connector/**'
      - '.github/workflows/v2-package.yml'
  pull_request:
    branches: [master]
    paths:
      - 'salesforce_datacloud_connector/**'
      - '.github/workflows/v2-package.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    defaults:
      run:
        working-directory: salesforce_datacloud_connector

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: salesforce_datacloud_connector/uv.lock

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev --locked

      - name: Lint package
        run: uv run ruff check salesforce_datacloud_connector --statistics

      - name: Lint tests
        run: uv run ruff check tests --statistics

      - name: Run tests
        run: uv run pytest -m "not e2e"
