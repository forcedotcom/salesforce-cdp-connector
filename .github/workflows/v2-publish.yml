name: v2 Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'salesforce-datacloud-connector-')
    runs-on: ubuntu-latest
    environment: pypi-v2
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: salesforce_datacloud_connector

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: salesforce_datacloud_connector/uv.lock

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: salesforce_datacloud_connector/dist
